
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CHSA · Portal de Ciências Humanas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Space+Grotesk:wght@400;500;700&family=Merriweather:ital,wght@0,300;0,700;1,400&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Space Grotesk', 'Inter', 'sans-serif'],
              serif: ['Merriweather', 'serif'],
            },
            colors: {
              tocantins: {
                yellow: '#FFCE00',
                blue: '#003399',
                green: '#009933'
              },
              // Paleta Gen Alpha — vibrante, alta saturação
              vibe: {
                pink:    '#FF3D8A',  // hot pink
                purple:  '#8B5CF6',  // electric purple
                cyan:    '#22D3EE',  // electric cyan
                lime:    '#A3E635',  // neon lime
                orange:  '#FF6B35',  // sunset orange
                magenta: '#D946EF',  // bright magenta
                blue:    '#3B82F6',  // bright blue
                indigo:  '#6366F1',  // indigo
              }
            },
            backgroundImage: {
              'gradient-vibe':     'linear-gradient(135deg, #FF3D8A 0%, #8B5CF6 50%, #22D3EE 100%)',
              'gradient-sunset':   'linear-gradient(135deg, #FF6B35 0%, #FF3D8A 50%, #8B5CF6 100%)',
              'gradient-ocean':    'linear-gradient(135deg, #3B82F6 0%, #22D3EE 50%, #A3E635 100%)',
              'gradient-aurora':   'linear-gradient(135deg, #22D3EE 0%, #8B5CF6 50%, #D946EF 100%)',
              'gradient-fire':     'linear-gradient(135deg, #FF6B35 0%, #FFCE00 50%, #A3E635 100%)',
              'gradient-cosmic':   'linear-gradient(135deg, #6366F1 0%, #D946EF 50%, #FF3D8A 100%)',
              'gradient-mint':     'linear-gradient(135deg, #A3E635 0%, #22D3EE 50%, #6366F1 100%)',
              'mesh-bg':           'radial-gradient(at 20% 20%, rgba(255,61,138,0.18) 0px, transparent 50%), radial-gradient(at 80% 0%, rgba(34,211,238,0.18) 0px, transparent 50%), radial-gradient(at 0% 80%, rgba(139,92,246,0.18) 0px, transparent 50%), radial-gradient(at 80% 80%, rgba(163,230,53,0.16) 0px, transparent 50%)',
            },
            boxShadow: {
              'glow-pink':    '0 0 60px -10px rgba(255,61,138,0.6)',
              'glow-purple':  '0 0 60px -10px rgba(139,92,246,0.6)',
              'glow-cyan':    '0 0 60px -10px rgba(34,211,238,0.6)',
              'glow-lime':    '0 0 60px -10px rgba(163,230,53,0.6)',
              'glow-orange':  '0 0 60px -10px rgba(255,107,53,0.6)',
              'inner-vibe':   'inset 0 2px 0 0 rgba(255,255,255,0.2), inset 0 -2px 0 0 rgba(0,0,0,0.05)',
            },
            animation: {
              'blob': 'blob 12s ease-in-out infinite',
              'gradient-shift': 'gradient-shift 8s ease infinite',
              'float': 'float 4s ease-in-out infinite',
              'pulse-glow': 'pulse-glow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            },
            keyframes: {
              'blob': {
                '0%, 100%': { transform: 'translate(0px,0px) scale(1)' },
                '33%':      { transform: 'translate(30px,-50px) scale(1.1)' },
                '66%':      { transform: 'translate(-20px,20px) scale(0.9)' },
              },
              'gradient-shift': {
                '0%, 100%': { 'background-position': '0% 50%' },
                '50%':      { 'background-position': '100% 50%' },
              },
              'float': {
                '0%, 100%': { transform: 'translateY(0px)' },
                '50%':      { transform: 'translateY(-10px)' },
              },
              'pulse-glow': {
                '0%, 100%': { opacity: '1', filter: 'brightness(1)' },
                '50%':      { opacity: '0.85', filter: 'brightness(1.2)' },
              },
            },
          }
        }
      }
    </script>
    <style>
      /* Scrollbar moderna */
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #8B5CF6 0%, #FF3D8A 100%); border-radius: 999px; }
      ::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, #FF3D8A 0%, #22D3EE 100%); }

      /* Selection */
      ::selection { background: rgba(255,61,138,0.3); color: inherit; }

      /* Texto com gradiente */
      .text-gradient-vibe { background: linear-gradient(135deg, #FF3D8A 0%, #8B5CF6 50%, #22D3EE 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
      .text-gradient-sunset { background: linear-gradient(135deg, #FF6B35 0%, #FF3D8A 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
      .text-gradient-aurora { background: linear-gradient(135deg, #22D3EE 0%, #8B5CF6 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900 antialiased">
    <div id="root">
      <div style="display:flex;justify-content:center;align-items:center;height:100vh;font-family:system-ui,sans-serif;color:#64748b;flex-direction:column;gap:1rem;background:linear-gradient(135deg,#fdf4ff 0%,#ecfeff 50%,#f0fdf4 100%);">
        <div style="width:3rem;height:3rem;border:4px solid #f1f5f9;border-top-color:#8B5CF6;border-right-color:#FF3D8A;border-radius:50%;animation:spin 1s linear infinite;"></div>
        <p style="font-weight:700;letter-spacing:0.1em;text-transform:uppercase;font-size:0.75rem;">Carregando portal…</p>
        <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
      </div>
    </div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
